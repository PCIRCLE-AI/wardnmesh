name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============== LINT ==============
  lint-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm run lint

  lint-sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: sdk-python-check
        run: |
          if [ -d "packages/sdk-python" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.sdk-python-check.outputs.exists == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - if: steps.sdk-python-check.outputs.exists == 'true'
        run: |
          cd packages/sdk-python
          rm -rf build dist *.egg-info
          # Install CPU-only torch first to save disk space
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install .[dev]
          rm -rf build  # Clean again after pip install
          black --check .
          mypy .

  # ============== TEST ==============
  test-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test

  test-sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: sdk-python-check
        run: |
          if [ -d "packages/sdk-python" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.sdk-python-check.outputs.exists == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - if: steps.sdk-python-check.outputs.exists == 'true'
        run: |
          cd packages/sdk-python
          # Install CPU-only torch first to save disk space
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install .[dev]
          pytest

  # ============== BUILD ==============
  build-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm run build

  # ============== DEPLOY (Manual via Cloudflare Dashboard) ==============
  # Automatic deployment is disabled - use Cloudflare Pages dashboard for deployment
  # To re-enable: add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets
  # deploy-web:
  #   runs-on: ubuntu-latest
  #   needs: [lint-root, lint-web, test-root, build-web]
  #   if: github.ref == 'refs/heads/master' && github.event_name == 'push'
  #   environment:
  #     name: production
  #     url: https://wardnmesh.ai
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: 'npm'
  #         cache-dependency-path: apps/web/package-lock.json
  #     - run: cd apps/web && npm ci
  #     - run: cd apps/web && npm run build:cloudflare
  #     - name: Deploy to Cloudflare
  #       run: cd apps/web && npx wrangler deploy
  #       env:
  #         CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  #         CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ============== PUBLISH (on tags) ==============
  publish-sdk-python:
    runs-on: ubuntu-latest
    needs: [test-sdk-python]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - id: sdk-python-check
        run: |
          if [ -d "packages/sdk-python" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.sdk-python-check.outputs.exists == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - if: steps.sdk-python-check.outputs.exists == 'true'
        run: |
          cd packages/sdk-python
          pip install build twine
          python3 -m build
          python3 -m twine upload dist/*
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
