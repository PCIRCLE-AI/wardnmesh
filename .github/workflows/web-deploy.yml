name: Web App CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-deploy.yml'
  pull_request:
    branches: [master]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-deploy.yml'

env:
  NODE_VERSION: '20'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ============== LINT & TYPE CHECK ==============
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npm run type-check

  # ============== BUILD VERIFICATION ==============
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          # Use dummy values for build verification
          NEXT_PUBLIC_APP_URL: https://example.com
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_key_for_build
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          NEXT_PUBLIC_STRIPE_PRO_PRICE_ID: price_dummy

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: apps/web/.next
          retention-days: 1

  # ============== E2E TESTS (Optional) ==============
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build-verification]
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3005
      MOCK_AUTH_BYPASS: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - id: supabase-check
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_PRO_PRICE_ID }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ] && [ -n "$STRIPE_SECRET_KEY" ] && [ -n "$STRIPE_PRICE_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.supabase-check.outputs.enabled != 'true'
        run: |
          echo "Skipping E2E tests: required Supabase/Stripe secrets are not configured."

      - name: Install dependencies
        if: steps.supabase-check.outputs.enabled == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.supabase-check.outputs.enabled == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: steps.supabase-check.outputs.enabled == 'true'
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always() && steps.supabase-check.outputs.enabled == 'true'
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ============== DEPLOY PREVIEW (PRs only) ==============
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build-verification]
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - id: vercel-check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if vercel whoami --token="$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.vercel-check.outputs.enabled != 'true'
        run: |
          echo "Skipping preview deploy: Vercel token is not configured."

      - name: Pull Vercel environment
        if: steps.vercel-check.outputs.enabled == 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        if: steps.vercel-check.outputs.enabled == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: deploy
        if: steps.vercel-check.outputs.enabled == 'true'
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "URL: $DEPLOYMENT_URL" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && steps.vercel-check.outputs.enabled == 'true'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment Ready!\n\n**Preview URL:** ${{ steps.deploy.outputs.url }}\n\n✅ Build completed successfully\n🔗 Visit the preview to test your changes\n\n<sub>Deployed from commit ${context.sha.substring(0, 7)}</sub>`
            })

  # ============== DEPLOY PRODUCTION (master only) ==============
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build-verification]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://wardnmesh.ai
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - id: vercel-check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if vercel whoami --token="$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.vercel-check.outputs.enabled != 'true'
        run: |
          echo "Skipping production deploy: Vercel token is not configured."

      - name: Pull Vercel environment
        if: steps.vercel-check.outputs.enabled == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        if: steps.vercel-check.outputs.enabled == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: deploy
        if: steps.vercel-check.outputs.enabled == 'true'
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "URL: $DEPLOYMENT_URL" >> $GITHUB_STEP_SUMMARY

      - name: Wait for deployment to be ready
        if: steps.vercel-check.outputs.enabled == 'true'
        run: sleep 30

      - name: Health check
        id: health-check
        if: steps.vercel-check.outputs.enabled == 'true'
        run: |
          echo "Checking production health..."
          for i in {1..5}; do
            # Check /en instead of / since root redirects (307) to /en for i18n
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://wardnmesh.ai/en)
            if [ $STATUS -eq 200 ]; then
              echo "✅ Health check passed (HTTP $STATUS)"
              echo "health=healthy" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "⏳ Attempt $i: HTTP $STATUS, retrying..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          echo "health=unhealthy" >> $GITHUB_OUTPUT
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "### ✅ Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://wardnmesh.ai" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Healthy (HTTP 200)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "### ❌ Production Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "Please check the logs and consider rollback." >> $GITHUB_STEP_SUMMARY
