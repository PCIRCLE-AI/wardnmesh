name: Desktop App Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: WardnMesh_aarch64.dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: WardnMesh_x86_64.dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: wardnmesh_amd64.AppImage
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: WardnMesh_x64-setup.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        env:
          GH_REF: ${{ github.ref }}
        run: echo "VERSION=${GH_REF#refs/tags/desktop-v}" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts to remove version
        run: |
          cd artifacts
          # Find all release files recursively and rename them
          find . -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.exe" \) | while read -r filepath; do
            dir=$(dirname "$filepath")
            file=$(basename "$filepath")
            # Remove version pattern _X.Y.Z from filename (e.g., _0.1.0_ or _0.1.0.)
            newname=$(echo "$file" | sed -E 's/_[0-9]+\.[0-9]+\.[0-9]+_/_/g; s/_[0-9]+\.[0-9]+\.[0-9]+\./_./g')
            if [ "$file" != "$newname" ]; then
              echo "Renaming $filepath -> $dir/$newname"
              mv "$filepath" "$dir/$newname"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: WardnMesh Desktop v${{ steps.version.outputs.VERSION }}
          body: |
            ## WardnMesh Desktop v${{ steps.version.outputs.VERSION }}

            AI Agent Security Monitor for your desktop.

            ### Downloads

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `WardnMesh_aarch64.dmg` |
            | macOS (Intel) | `WardnMesh_x64.dmg` |
            | Windows | `WardnMesh_x64-setup.exe` |
            | Linux | `WardnMesh_amd64.AppImage` |

            ### Installation Notes

            **macOS**: You may need to right-click and select "Open" on first launch due to Gatekeeper.

            **Windows**: Windows SmartScreen may show a warning. Click "More info" and then "Run anyway".

            **Linux**: Make the AppImage executable with `chmod +x wardnmesh_amd64.AppImage` before running.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
